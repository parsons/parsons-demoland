<h1>
	<span>CSS</span>
	Grid display: justify and align
</h1>
<p>
	In CSS grid, <span class="info-code">justify</span> controls the row axis, and <span class="info-code">align</span> controls the column axis.
</p>
<p>
	Here we have a two-column grid, defined by <span class="info-code">grid-template-columns: 30% 30%;</span>. Let's take a look how <span class="info-code">justify-content</span> and <span class="info-code">align-items</span> work in this grid layout.
</p>
