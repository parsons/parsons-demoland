        display: flex;

</style>

<body>

        "Rustling" // 3

    const colors = [
        "dodgerblue", // 0

        "crimson" // 3
    ]

    let counter = 0

    pTag.addEventListener("click", function () {
        bodyTag.style.backgroundColor = colors[0]
        pTag.innerHTML = phrases[0]
