<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set up a randomizer</title>
</head>
<style>
    /* CSS reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;

        padding: 40px;

        display: grid;
        grid-template-columns: 100%;
        justify-content: center;
        align-items: flex-end;

        gap: 40px;

        transition: background-color 0.5s ease-in-out,
            color 0.5s ease-in-out;
    }

    .text {
        text-align: center;
        font-size: 32px;
    }

    button {
        /* remove browser default button styling */
        background-color: transparent;
        border: none;

        font-family: Helvetica, Arial, sans-serif;
        color: rgb(155, 155, 155);
        font-size: 18px;
    }
</style>

<body>
    <p class="text">Poem generator</p>
    <button>randomize</button>

<script>
    const bodyTag = document.querySelector("body")
    const pTag = document.querySelector("p")
    const buttonTag = document.querySelector("button")

    const phrases = [
        "Rootless, wanting true roots", // 0
        "Conspicuous", // 1
        "In exile", // 2
        "Rustling" // 3
    ]

    const colors = [
        "dodgerblue", // 0
        "yellow", // 1
        "olive", // 2
        "crimson" // 3
    ]

    let counter = 0

    buttonTag.addEventListener("click", function () {
        counter = Math.floor(Math.random() * phrases.length)

        bodyTag.style.backgroundColor = colors[counter]
        pTag.innerHTML = phrases[counter]

        console.log(counter)
    })
</script>

</body>
</html>
