<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshooting Errors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 18px;
            padding: 40px;
            background-color: #f0f0f0;
        }

        .example {
            background-color: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .example h3 {
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="example" id="example-1">
        <h3>Example 1</h3>
        <div id="output-1"></div>
    </div>

    <div class="example" id="example-2">
        <h3>Example 2</h3>
        <div id="output-2"></div>
    </div>

    <div class="example" id="example-3">
        <h3>Example 3</h3>
        <div id="output-3"></div>
    </div>

    <div class="example" id="example-4">
        <h3>Example 4</h3>
        <div id="output-4"></div>
    </div>

    <script>
        // Bug 1: Unclosed string
        var greeting = "hello;
        document.getElementById("output-1").textContent = greeting;

        // Bug 2: Wrong variable name
        var message = "This should show up";
        document.getElementById("output-2").textContent = mesage;

        // Bug 3: Missing parenthesis
        document.getElementById("output-3".textContent = "Fixed!";

        // Bug 4: This one works!
        document.getElementById("output-4").textContent = "No bugs here.";
    </script>

</body>

</html>
