<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>A JSON Object</title>
</head>
<body>

	<pre id="output"></pre>

	<script>
		// This is the JSON!
		// In your activity today, this would go in a separate file.
		var person = {
			"name": "Ada Lovelace",
			"role": "Mathematician & Writer",
			"born": 1815,
			"skills": ["mathematics", "programming", "writing"],
			"favoriteColor": "#7b2d8b"
		};

		// This is what prints out the JSON on the page
		document.getElementById("output").textContent = JSON.stringify(person, null, 2);
	</script>

</body>
</html>
